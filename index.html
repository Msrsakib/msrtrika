<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSR Trika - Spotify Migrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spotify-green { background-color: #1DB954; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="bg-black text-white font-sans">
    <div class="container mx-auto px-4 py-12 max-w-xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black mb-2 uppercase tracking-tighter text-green-500">MSR Trika</h1>
            <p class="text-zinc-500 text-sm">Transfer playlists between Spotify accounts securely.</p>
        </header>

        <div id="source-section" class="bg-zinc-900 p-6 rounded-xl border border-zinc-800 mb-6">
            <h2 class="text-lg font-bold mb-4">Step 1: Source Account</h2>
            <button onclick="login('source')" class="spotify-green text-black font-bold py-3 px-6 rounded-full w-full hover:scale-105 transition-transform">
                Connect Source ID
            </button>
        </div>

        <div id="transfer-section" class="hidden bg-zinc-900 p-6 rounded-xl border border-zinc-800 mb-6">
            <h2 class="text-lg font-bold mb-2">Step 2: Target Account</h2>
            <p id="playlist-count" class="text-sm text-zinc-400 mb-4 font-mono">No playlists loaded yet.</p>
            <button onclick="login('target')" class="bg-white text-black font-bold py-3 px-6 rounded-full w-full hover:scale-105 transition-transform">
                Connect Target ID & Start
            </button>
        </div>

        <div class="mt-4">
            <h3 class="text-xs font-bold text-zinc-600 uppercase mb-2">System Status:</h3>
            <div id="status-log" class="bg-zinc-950 border border-zinc-800 p-4 rounded-lg h-48 overflow-y-auto text-[10px] font-mono text-green-400 leading-relaxed">
                > System Ready... Waiting for user action.
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
